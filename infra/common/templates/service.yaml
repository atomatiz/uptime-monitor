apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
  namespace: {{ .Release.Namespace | default "uptime-monitor" }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
  - port: {{ .Values.service.port | default 3000 }}
    targetPort: {{ .Values.service.targetPort | default 8001 }}
    protocol: TCP
  selector:
    app: {{ .Release.Name }}